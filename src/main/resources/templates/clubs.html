<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Club List</title>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-ka7Sk0Gln4gmtz2MlQnikT1wXgYsOg+OMhuP+IlRH9sENBO0LRn5q+8nbTov4+1p" crossorigin="anonymous"></script>
</head>
<body>
<header th:insert="~{fragments/navbar :: header}"></header>
<main class="container">

    <div th:fragment="clubs">
        <h1>Campus Clubs</h1>
        <table>
            <thead>
            <tr>
                <th>Name</th>
                <th>Category</th>
                <th>Description</th>
                <th>Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:if="${clubs.empty}">
                <td colspan="2">
                    <p>No Clubs available</p>
                </td>
            </tr>
            <tr th:each="club : ${clubs}">
                <td th:text="${club.name}"></td>
                <td th:text="${club.category}"></td>
                <td>
                    <details>
                        <summary>Description</summary>
                        <p th:text="${club.description}"></p>
                    </details>

                </td>

                <td>
                    <a th:href="@{/clubs/{id}(id=${club.id})}">EDIT</a>
                </td>
            </tr>
            </tbody>
        </table>

    </div>

</main>
</body>
</html>
