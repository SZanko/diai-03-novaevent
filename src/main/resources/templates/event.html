<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Event Details</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">
</head>
<body>
<header th:replace="~{fragments/navbar :: header}"></header>
<main class="container mt-4">
    <h1 th:text="${event.name}"></h1>
    <p class="text-muted">
        Club: <a th:href="@{/clubs/{clubId}(clubId=${club.id})}" th:text="${event.club}"></a>
    </p>

    <dl class="row">
        <dt class="col-sm-3">Date</dt>
        <dd class="col-sm-9" th:text="${event.date}"></dd>

        <dt class="col-sm-3">Type</dt>
        <dd class="col-sm-9" th:text="${event.type}"></dd>

        <dt class="col-sm-3">Location</dt>
        <dd class="col-sm-9" th:text="${event.location} ?: '—'"></dd>

        <dt class="col-sm-3">Description</dt>
        <dd class="col-sm-9" th:text="${event.description} ?: '—'"></dd>

        <dt class="col-sm-3">Created By</dt>
        <dd class="col-sm-9" th:text="${event.ownerUsername}"></dd>
    </dl>

    <div class="d-flex gap-2">
        <a class="btn btn-secondary" th:href="@{/clubs/{clubId}(clubId=${club.id})}">Back to Club</a>
        <a class="btn btn-primary"
           th:if="${#authentication != null and #authentication.name == event.ownerUsername}"
           th:href="@{/clubs/{clubId}/events/{eventId}/edit(clubId=${club.id}, eventId=${event.id})}">
            Edit
        </a>
        <a class="btn btn-danger"
           th:if="${#authorization.expression('hasRole(''ADMIN'')') or (#authentication != null and #authentication.name == event.ownerUsername)}"
           th:href="@{/clubs/{clubId}/events/{eventId}/delete(clubId=${club.id}, eventId=${event.id})}">
            Delete
        </a>
    </div>
</main>
</body>
</html>
