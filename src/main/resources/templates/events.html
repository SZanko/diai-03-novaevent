<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>All Events</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-ka7Sk0Gln4gmtz2MlQnikT1wXgYsOg+OMhuP+IlRH9sENBO0LRn5q+8nbTov4+1p"
            crossorigin="anonymous"></script>
</head>
<body>
<header th:insert="~{fragments/navbar :: header}"></header>
<div class="container">
    <!-- TODO filter stuff html -->
</div>
<main class="container">
    <div th:fragment="events-table">
    <table class="table table-striped">
        <thead>
        <tr>
            <th>Name</th>
            <th>Club</th>
            <th>Date</th>
            <th>Type</th>
            <th>Location</th>
            <th>Action</th>
        </tr>
        </thead>
        <tbody>
        <tr th:if="${events.empty}">
            <td colspan="2" th:text="No Clubs configured"></td>
        </tr>
        <tr th:each="event : ${events}">
            <td th:text="${event.name}"></td>
            <td th:text="${event.club}"></td>
            <td th:text="${event.date}"></td>
            <td th:text="${event.type}"></td>
            <td th:text="${event.location}"></td>
            <td>
                <a class="btn btn-secondary" th:href="@{/clubs/{clubid}/{id}/edit(clubid=${event.clubId}, id=${event.id})}">
                    Edit
                </a>
                <a class="btn btn-secondary"
                   th:href="@{/clubs/{clubid}/{id}/delete(clubid=${event.clubId}, id=${event.id})}">
                    Delete
                </a>
            </td>
        </tr>
        </tbody>
    </table>
    </div>
</main>
</body>
</html>
