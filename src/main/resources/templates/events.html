<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>All Events</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">
</head>
<body>
<header th:replace="~{fragments/navbar :: header}"></header>
<main class="container mt-4">
    <h1>All Events</h1>
    <div th:fragment="events-table">
        <table class="table table-striped align-middle">
            <thead>
            <tr>
                <th>Name</th>
                <th>Club</th>
                <th>Date</th>
                <th>Type</th>
                <th>Location</th>
                <th>Created By</th>
                <th>Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:if="${events.empty}">
                <td colspan="7">No Events available</td>
            </tr>
            <tr th:each="event : ${events}">
                <td>
                    <a th:href="@{/clubs/{clubId}/events/{eventId}(clubId=${event.clubId}, eventId=${event.id})}" th:text="${event.name}"></a>
                </td>
                <td th:text="${event.club}"></td>
                <td th:text="${event.date}"></td>
                <td th:text="${event.type}"></td>
                <td th:text="${event.location} ?: '—'"></td>
                <td th:text="${event.ownerUsername}"></td>
                <td class="d-flex gap-2">
                    <a class="btn btn-sm btn-outline-primary" th:href="@{/clubs/{clubId}/events/{eventId}/edit(clubId=${event.clubId}, eventId=${event.id})}">Edit</a>
                    <a class="btn btn-sm btn-outline-danger" th:href="@{/clubs/{clubId}/events/{eventId}/delete(clubId=${event.clubId}, eventId=${event.id})}">Delete</a>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</main>
</body>
</html>
