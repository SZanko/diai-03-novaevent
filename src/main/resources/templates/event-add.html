<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Add Event</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
</head>
<body>
<header th:replace="~{fragments/navbar :: header}"></header>
<main class="container mt-4">
    <h1>Add Event</h1>
    <p class="text-muted" th:text="${club.name}"></p>

    <form th:action="@{/clubs/{club}/events(club=${club.id})}" th:object="${event}" method="post">
        <div class="mb-3">
            <label for="name" class="form-label">Name</label>
            <input id="name" type="text" th:field="*{name}" class="form-control">
            <div class="text-danger" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
        </div>

        <div class="mb-3">
            <label for="date" class="form-label">Date</label>
            <input id="date" type="date" th:field="*{date}" class="form-control">
            <div class="text-danger" th:if="${#fields.hasErrors('date')}" th:errors="*{date}"></div>
        </div>

        <div class="mb-3">
            <label for="type" class="form-label">Type</label>
            <select id="type" class="form-control" th:field="*{type}">
                <option value="">Select a type</option>
                <option th:each="t : ${T(pt.unl.fct.iadi.novaevents.controller.dto.EventTypeDTO).values()}" th:value="${t}" th:text="${t}"></option>
            </select>
            <div class="text-danger" th:if="${#fields.hasErrors('type')}" th:errors="*{type}"></div>
        </div>

        <div class="mb-3">
            <label for="location" class="form-label">Location</label>
            <div class="input-group">
                <input id="location" type="text" th:field="*{location}" class="form-control">
                <button id="check-weather-js" type="button" class="btn btn-outline-primary">Check Weather JS</button>
                <button
                    type="button"
                    class="btn btn-outline-secondary"
                    hx-get="/api/weather"
                    hx-include="#location"
                    hx-target="#weather-result"
                    hx-swap="innerHTML"
                >Check Weather HTMX</button>
            </div>
            <div class="text-danger" th:if="${#fields.hasErrors('location')}" th:errors="*{location}"></div>
            <div id="weather-result" class="mt-2"></div>
        </div>

        <div class="mb-3">
            <label for="description" class="form-label">Description</label>
            <textarea id="description" th:field="*{description}" class="form-control" rows="3"></textarea>
        </div>

        <div class="d-flex gap-2">
            <button type="submit" class="btn btn-success">Create</button>
            <a class="btn btn-secondary" th:href="@{/clubs/{clubId}(clubId=${club.id})}">Cancel</a>
        </div>
    </form>
</main>
<script>
    document.addEventListener("DOMContentLoaded", () => {
        const button = document.getElementById("check-weather-js");
        const locationInput = document.getElementById("location");
        const result = document.getElementById("weather-result");

        const renderWeather = (raining) => {
            if (raining === true) {
                return '<span class="badge bg-warning text-dark">Raining</span>';
            }
            if (raining === false) {
                return '<span class="badge bg-success">Clear</span>';
            }
            return '<span class="text-secondary">Weather data unavailable.</span>';
        };

        button.addEventListener("click", async () => {
            const location = locationInput.value.trim();
            if (!location) {
                result.innerHTML = renderWeather(null);
                return;
            }

            try {
                const response = await fetch(`/api/weather?location=${encodeURIComponent(location)}`, {
                    headers: {Accept: "application/json"},
                });
                if (!response.ok) {
                    result.innerHTML = renderWeather(null);
                    return;
                }
                const data = await response.json();
                result.innerHTML = renderWeather(data.raining);
            } catch (error) {
                result.innerHTML = renderWeather(null);
            }
        });
    });
</script>
</body>
</html>
