<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add Event</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-ka7Sk0Gln4gmtz2MlQnikT1wXgYsOg+OMhuP+IlRH9sENBO0LRn5q+8nbTov4+1p" crossorigin="anonymous"></script>
</head>
<body>

<header th:insert="~{fragments/navbar :: header}"></header>

<main class="container">
  <form th:action="@{/clubs/{club}/add(club=${clubId})}" th:object="${event}" method="post">

    <div class="mb-3">
      <label>Name
      <input type="text" th:field="*{name}" class="form-control"/>
      </label>
    </div>

    <div class="mb-3">
      <label>Date
      <input type="date" th:field="*{date}" class="form-control"/>
      </label>
    </div>
    <div class="mb-3">
      <label>Type
        <select class="form-control" th:field="*{type}">
          <option th:each="t : ${T(pt.unl.fct.iadi.novaevents.controller.dto.EventTypeDTO).values()}"
                  th:value="${t}"
                  th:text="${t}">
          </option>
        </select>
      </label>
    </div>

    <div class="mb-3">
      <label>Location
      <input type="text" th:field="*{location}" class="form-control"/>
      </label>
    </div>
    <div class="mb-3">
      <label>Description
        <input type="text" th:field="*{description}" class="form-control"/>
      </label>
    </div>

    <button type="submit" class="btn btn-success">Create</button>
  </form>
</main>

</body>
</html>
