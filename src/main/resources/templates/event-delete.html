<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Delete Event</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">
</head>
<body>
<header th:replace="~{fragments/navbar :: header}"></header>
<main class="container mt-4">
    <h1>Delete Event</h1>
    <p>Are you sure you want to delete the following event?</p>

    <div class="mb-4">
        <h5>Name</h5>
        <p th:text="${event.name}"></p>

        <h5>Date</h5>
        <p th:text="${event.date}"></p>

        <h5>Type</h5>
        <p th:text="${event.type}"></p>

        <h5>Location</h5>
        <p th:text="${event.location} ?: '—'"></p>

        <h5>Description</h5>
        <p th:text="${event.description} ?: '—'"></p>

        <h5>Club</h5>
        <p th:text="${event.club}"></p>

        <h5>Created By</h5>
        <p th:text="${event.ownerUsername}"></p>
    </div>

    <form th:action="@{/clubs/{club}/events/{eventId}(club=${event.clubId}, eventId=${event.id})}" method="post">
        <input type="hidden" name="_method" value="delete">
        <button type="submit" class="btn btn-danger">Yes, Delete</button>
        <a class="btn btn-secondary" th:href="@{/clubs/{club}/events/{eventId}(club=${event.clubId}, eventId=${event.id})}">Cancel</a>
    </form>
</main>
</body>
</html>
