<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Club Details</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">
</head>
<body>
<header th:replace="~{fragments/navbar :: header}"></header>
<main class="container mt-4">
    <h1 th:text="${club.name}"></h1>
    <p th:text="${club.description}"></p>

    <div class="d-flex gap-2 mb-4">
        <a class="btn btn-secondary" th:href="@{/events(club=${club.id})}">View Events</a>
        <a class="btn btn-primary" th:if="${#authorization.expression('hasAnyRole(''EDITOR'',''ADMIN'')')}" th:href="@{/clubs/{club}/events/new(club=${club.id})}">Add Event</a>
    </div>

    <div th:replace="~{events :: events-table}"></div>
</main>
</body>
</html>
