<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Club Details</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-ka7Sk0Gln4gmtz2MlQnikT1wXgYsOg+OMhuP+IlRH9sENBO0LRn5q+8nbTov4+1p"
            crossorigin="anonymous"></script>
</head>
<body>
<header th:insert="~{fragments/navbar :: header}"></header>
<main class="container">
    <h1 th:text="${club.name}"></h1>

    <p th:text="${club.description}"></p>

    <a class="btn btn-secondary" th:href="@{/events(club=${club.id})}">
        View Events
    </a>

    <a class="btn btn-primary" th:href="@{/clubs/{club}/add(club=${club.id})}">
        Add Events
    </a>

    <div th:insert="~{events :: events-table}"></div>


</main>
</body>
</html>
