<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Edit Event</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<header th:replace="~{fragments/navbar :: header}"></header>
<main class="container mt-4">
    <h1>Edit Event</h1>

    <form th:action="@{/clubs/{club}/events/{eventId}(club=${event.clubId}, eventId=${event.id})}" th:object="${event}" method="post">
        <input type="hidden" name="_method" value="put">

        <div class="mb-3">
            <label for="name" class="form-label">Name</label>
            <input id="name" type="text" th:field="*{name}" class="form-control">
            <div class="text-danger" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
        </div>

        <div class="mb-3">
            <label for="date" class="form-label">Date</label>
            <input id="date" type="date" th:field="*{date}" class="form-control">
            <div class="text-danger" th:if="${#fields.hasErrors('date')}" th:errors="*{date}"></div>
        </div>

        <div class="mb-3">
            <label for="type" class="form-label">Type</label>
            <select id="type" class="form-select" th:field="*{type}">
                <option value="">Select a type</option>
                <option th:each="t : ${T(pt.unl.fct.iadi.novaevents.controller.dto.EventTypeDTO).values()}" th:value="${t}" th:text="${t}"></option>
            </select>
            <div class="text-danger" th:if="${#fields.hasErrors('type')}" th:errors="*{type}"></div>
        </div>

        <div class="mb-3">
            <label for="location" class="form-label">Location</label>
            <input id="location" type="text" th:field="*{location}" class="form-control">
        </div>

        <div class="mb-3">
            <label for="description" class="form-label">Description</label>
            <textarea id="description" th:field="*{description}" class="form-control" rows="3"></textarea>
        </div>

        <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary">Save</button>
            <a class="btn btn-secondary" th:href="@{/clubs/{club}/events/{eventId}(club=${event.clubId}, eventId=${event.id})}">Cancel</a>
        </div>
    </form>
</main>
</body>
</html>
