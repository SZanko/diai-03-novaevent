<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Edit Event</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
<header th:replace="~{fragments/navbar :: header}"></header>

<main class="container mt-4">
    <h1>Edit Event</h1>

    <form th:action="@{/clubs/{club}/{eventId}/edit(club=${event.clubId}, eventId=${event.id})}"
          th:object="${event}"
          method="post">

        <div class="mb-3">
            <label class="form-label">Name</label>
            <input type="text" th:field="*{name}" class="form-control"/>
            <div class="text-danger"
                 th:if="${#fields.hasErrors('name')}"
                 th:errors="*{name}"></div>
        </div>

        <!-- Date -->
        <div class="mb-3">
            <label class="form-label">Date
                <input type="date" th:field="*{date}" class="form-control"/>
            </label>
            <div class="text-danger"
                 th:if="${#fields.hasErrors('date')}"
                 th:errors="*{date}"></div>
        </div>

        <!-- Type -->
        <div class="mb-3">
            <label class="form-label">Type
                <select class="form-select" th:field="*{type}">
                    <option value="">Select a type</option>
                    <option th:each="t : ${T(pt.unl.fct.iadi.novaevents.controller.dto.EventTypeDTO).values()}"
                            th:value="${t}"
                            th:text="${t}">
                    </option>
                </select></label>
            <div class="text-danger"
                 th:if="${#fields.hasErrors('type')}"
                 th:errors="*{type}"></div>
        </div>

        <!-- Location -->
        <div class="mb-3">
            <label class="form-label">Location
            <input type="text" th:field="*{location}" class="form-control"/>
            </label>
        </div>

        <!-- Description -->
        <div class="mb-3">
            <label class="form-label">Description
            <textarea th:field="*{description}" class="form-control" rows="3"></textarea>
            </label>
        </div>

        <!-- Buttons -->
        <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary">Save</button>

            <a class="btn btn-secondary"
               th:href="@{/clubs/{club}/{eventId}(club=${event.clubId}, eventId=${event.id})}">
                Cancel
            </a>
        </div>

    </form>
</main>

</body>
</html>
