spring.application.name=novaevents-test
spring.mvc.hiddenmethod.filter.enabled=true

spring.datasource.url=jdbc:h2:mem:novaevents;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_UPPER=false
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.sql.init.mode=never

app.security.jwt.secret=NovaEventsJwtSecretKeyForSigningTokens2026NovaEvents
app.security.jwt.expiration-seconds=43200
app.security.jwt.cookie-secure=false

weather.api.key=test-weather-key
